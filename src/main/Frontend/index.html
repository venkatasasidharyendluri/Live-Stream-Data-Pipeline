<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Kafka Live Stream Chat</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        /* 1. Base Setup */
        body { 
            background-color: #000; 
            background-image: radial-gradient(circle at 50% 50%, #1a1a1a 0%, #000 100%);
            color: white; 
            font-family: 'Inter', sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            overflow: hidden;
        }

        /* 2. The Glass Container */
        .container { 
            width: 380px; 
            height: 600px; 
            /* Glassmorphism Effect */
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(10px); 
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            position: relative;
        }

        /* 3. Subtle Header */
        .header { 
            padding: 20px; 
            background: linear-gradient(90deg, rgba(204,0,0,0.8) 0%, rgba(100,0,0,0) 100%);
            color: white; 
            font-weight: 800; 
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.9em;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            z-index: 2;
        }

        /* 4. Chat Area */
        #chat-box { 
            flex: 1; 
            overflow-y: auto; 
            padding: 15px; 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
            /* Hide scrollbar for cleaner look */
            scrollbar-width: none; 
            -ms-overflow-style: none;
        }
        #chat-box::-webkit-scrollbar { display: none; }

        /* 5. The Message Bubbles */
        .message { 
            padding: 10px 14px; 
            background: rgba(0, 0, 0, 0.4); 
            border-radius: 12px; 
            border-left: 3px solid transparent; /* Colored accent */
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            
            /* The Animation */
            animation: slideUpFade 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            opacity: 0;
            transform: translateY(20px) scale(0.95);
        }

        .author { 
            font-size: 0.75em; 
            font-weight: 700; 
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .text { 
            color: #eeeeee; 
            font-size: 0.95em; 
            line-height: 1.4;
            text-shadow: 0 1px 2px black;
        }

        /* 6. System Messages (Connection Status) */
        .system-msg {
            text-align: center;
            font-size: 0.7em;
            color: #ffffffaa;
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 5px 10px;
            align-self: center;
            margin: 10px 0;
            animation: fadeIn 0.5s ease;
        }

        /* 7. Keyframes for Animation */
        @keyframes slideUpFade { 
            from { opacity: 0; transform: translateY(30px) scale(0.9); } 
            to { opacity: 1; transform: translateY(0) scale(1); } 
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    </style>
</head>
<body>

    <div class="container">
        <div class="header">🔴 Live Stream Chat</div>
        <div id="chat-box"></div>
        <div style="height: 20px; background: linear-gradient(to top, rgba(0,0,0,0.2), transparent); pointer-events: none;"></div>
    </div>

    <script>
        const ws = new WebSocket("ws://localhost:8080");
        const chatBox = document.getElementById("chat-box");

        // Helper: Generate a consistent color based on the username string
        function stringToColor(str) {
            let hash = 0;
            for (let i = 0; i < str.length; i++) {
                hash = str.charCodeAt(i) + ((hash << 5) - hash);
            }
            const c = (hash & 0x00FFFFFF).toString(16).toUpperCase();
            return '#' + "00000".substring(0, 6 - c.length) + c;
        }

        ws.onopen = () => {
            console.log("Connected to Kafka Consumer!");
            addSystemMessage("⚡ CONNECTED TO KAFKA STREAM");
        };

        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            addMessage(data.user, data.text);
        };

        ws.onclose = () => {
            addSystemMessage("❌ SIGNAL LOST");
        };

        function addMessage(user, text) {
            const div = document.createElement("div");
            div.className = "message";
            
            // Get unique color for user
            const userColor = stringToColor(user);
            div.style.borderLeftColor = userColor; // Add colored border accent

            div.innerHTML = `<div class="author" style="color: ${userColor}">${user}</div><div class="text">${text}</div>`;
            
            chatBox.appendChild(div);
            
            // Smooth scroll to bottom
            chatBox.scrollTo({ top: chatBox.scrollHeight, behavior: 'smooth' });

            // Cleanup: Remove old messages if there are too many (keeps animation smooth)
            if (chatBox.children.length > 50) {
                chatBox.removeChild(chatBox.firstChild);
            }
        }

        function addSystemMessage(text) {
            const div = document.createElement("div");
            div.className = "system-msg";
            div.innerHTML = text;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
